title: Multi Battery HEMS
views:

  # ---------------------------------------------------------------------------
  # View 1 — Live Monitor
  # ---------------------------------------------------------------------------
  - title: Live Monitor
    path: live-monitor
    icon: mdi:monitor-eye
    cards:

      - type: markdown
        title: HEMS Status
        content: |
          ## HEMS Status
          <ha-entity-badge entity="sensor.multi_battery_hems_status"></ha-entity-badge>

      - type: horizontal-stack
        cards:
          - type: entities
            title: Overzicht
            entities:
              - entity: select.multi_battery_hems_actieve_strategie
                name: Actieve strategie
              - entity: sensor.multi_battery_hems_netvermogen
                name: Netvermogen
              - entity: sensor.multi_battery_hems_actuele_stroomprijs
                name: Actuele stroomprijs
              - entity: sensor.multi_battery_hems_status
                name: Status

      - type: gauge
        title: Netvermogen
        entity: sensor.multi_battery_hems_netvermogen
        min: -3500
        max: 3500
        needle: true
        severity:
          green: -3500
          yellow: -200
          red: 200

      - type: history-graph
        title: Netvermogen (2 uur)
        hours_to_show: 2
        entities:
          - entity: sensor.multi_battery_hems_netvermogen
            name: Netvermogen

      - type: history-graph
        title: Stroomprijs (24 uur)
        hours_to_show: 24
        entities:
          - entity: sensor.multi_battery_hems_actuele_stroomprijs
            name: Stroomprijs

  # ---------------------------------------------------------------------------
  # View 2 — Testmodus & Bediening
  # ---------------------------------------------------------------------------
  - title: Testmodus & Bediening
    path: testmodus
    icon: mdi:test-tube
    cards:

      - type: markdown
        content: |
          ## Testmodus

          Stel een P1-testwaarde in om de integratie te testen zonder echte hardware:
          - **Positief** (+500W): simuleert netverbruik → strategie moet ontladen
          - **Negatief** (-400W): simuleert teruglevering → strategie moet laden
          - **0**: testmodus uit, echte P1-sensor actief

      - type: entities
        title: Testbediening
        entities:
          - entity: number.multi_battery_hems_p1_testwaarde
            name: P1 testwaarde
          - entity: button.multi_battery_hems_stop_testmodus
            name: Stop testmodus
          - entity: button.multi_battery_hems_nu_bijwerken
            name: Nu bijwerken

      - type: entities
        title: Strategiebediening
        entities:
          - entity: select.multi_battery_hems_actieve_strategie
            name: Actieve strategie

      - type: markdown
        content: |
          ## Teken-correctie

          Als de integratie het omgekeerde doet van wat verwacht:
          1. Ga naar **Instellingen → Integraties → Multi Battery HEMS → Configureren**
          2. Zet 'P1 teken omdraaien' aan
          3. Herstart de integratie

  # ---------------------------------------------------------------------------
  # View 3 — Financiën
  # ---------------------------------------------------------------------------
  - title: Financiën
    path: financien
    icon: mdi:cash-multiple
    cards:

      - type: glance
        title: Gecombineerd
        entities:
          - entity: sensor.multi_battery_hems_gecombineerd_dagwinst
            name: Dagwinst
          - entity: sensor.multi_battery_hems_gecombineerd_weekwinst
            name: Weekwinst
          - entity: sensor.multi_battery_hems_gecombineerd_maandwinst
            name: Maandwinst
          - entity: sensor.multi_battery_hems_gecombineerd_jaarwinst
            name: Jaarwinst

      - type: entities
        title: Marstek Venus E
        entities:
          - entity: sensor.multi_battery_hems_marstek_venus_e_dagwinst
            name: Dagwinst
          - entity: sensor.multi_battery_hems_marstek_venus_e_weekwinst
            name: Weekwinst
          - entity: sensor.multi_battery_hems_marstek_venus_e_maandwinst
            name: Maandwinst
          - entity: sensor.multi_battery_hems_marstek_venus_e_jaarwinst
            name: Jaarwinst
          - entity: sensor.multi_battery_hems_marstek_venus_e_totaal_geladen
            name: Totaal geladen (kWh)
          - entity: sensor.multi_battery_hems_marstek_venus_e_totaal_ontladen
            name: Totaal ontladen (kWh)

      - type: entities
        title: Zendure SolarFlow
        entities:
          - entity: sensor.multi_battery_hems_zendure_solarflow_dagwinst
            name: Dagwinst
          - entity: sensor.multi_battery_hems_zendure_solarflow_weekwinst
            name: Weekwinst
          - entity: sensor.multi_battery_hems_zendure_solarflow_maandwinst
            name: Maandwinst
          - entity: sensor.multi_battery_hems_zendure_solarflow_jaarwinst
            name: Jaarwinst
          - entity: sensor.multi_battery_hems_zendure_solarflow_totaal_geladen
            name: Totaal geladen (kWh)
          - entity: sensor.multi_battery_hems_zendure_solarflow_totaal_ontladen
            name: Totaal ontladen (kWh)

      - type: history-graph
        title: Gecombineerde dagwinst (7 dagen)
        hours_to_show: 168
        entities:
          - entity: sensor.multi_battery_hems_gecombineerd_dagwinst
            name: Dagwinst
